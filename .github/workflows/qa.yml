name: PsiPro QA

on:
  push:
    branches: [main, master]
  schedule:
    # Todo dia às 9h (UTC) = 6h em Brasília
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Permite rodar manualmente pelo GitHub

concurrency:
  group: psipro-qa
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qa-psipro

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: qa-psipro/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npm run test
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://psipro-dashboard-production.up.railway.app' }}
          API_URL: ${{ vars.API_URL || 'https://psipro-backend-production.up.railway.app' }}
          API_PATH_PREFIX: ${{ vars.API_PATH_PREFIX || 'api' }}
          AUTH_USER: ${{ secrets.AUTH_USER }}
          AUTH_PASS: ${{ secrets.AUTH_PASS }}
          LOGIN_DELAY_MS: ${{ vars.LOGIN_DELAY_MS || '2000' }}

      - name: Upload playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: qa-psipro/playwright-report/
          retention-days: 7
