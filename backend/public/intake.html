<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PsiPro — Formulário de Cadastro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #1f2937; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 10; }
    .header-inner { max-width: 480px; margin: 0 auto; padding: 12px 16px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .logo { font-size: 18px; font-weight: 700; color: #4f46e5; }
    .secure-badge { font-size: 12px; color: #6b7280; }
    .progress-wrap { display: flex; align-items: center; gap: 10px; }
    .progress-bar { flex: 1; height: 8px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: #4f46e5; border-radius: 99px; transition: width .3s; }
    .progress-label { font-size: 12px; color: #6b7280; white-space: nowrap; }
    main { max-width: 480px; margin: 0 auto; padding: 24px 16px 40px; }
    .step-header { text-align: center; margin-bottom: 20px; }
    .step-icon { font-size: 36px; }
    .step-title { font-size: 20px; font-weight: 700; color: #1f2937; margin-top: 4px; }
    .step-sub { font-size: 13px; color: #6b7280; }
    .card { background: #fff; border-radius: 16px; border: 1px solid #f3f4f6; box-shadow: 0 1px 4px rgba(0,0,0,.05); padding: 20px; }
    .field { margin-bottom: 16px; }
    label.field-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 4px; }
    .req { color: #ef4444; }
    input[type=text], input[type=email], input[type=tel], input[type=date], select, textarea {
      width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px 12px;
      font-size: 14px; color: #1f2937; background: #fff; transition: border-color .2s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
    textarea { resize: none; }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    .age-box { border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #6b7280; background: #f9fafb; }
    .radio-group { display: flex; gap: 16px; flex-wrap: wrap; padding: 4px 0; }
    .radio-group label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 14px; }
    .note { font-size: 12px; color: #6b7280; background: #eef2ff; border-radius: 8px; padding: 8px 12px; margin-bottom: 16px; }
    .note.gray { background: #f3f4f6; }
    .nav { display: flex; gap: 10px; margin-top: 16px; }
    .btn { flex: 1; padding: 12px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #fff; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-back-text { width: 100%; margin-top: 8px; padding: 8px; background: none; border: none; font-size: 13px; color: #9ca3af; cursor: pointer; }
    .btn-back-text:hover { color: #374151; }
    .consent-label { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; padding: 16px; border: 1px solid #e5e7eb; border-radius: 12px; transition: background .2s; }
    .consent-label:hover { background: #f9fafb; }
    .consent-label input[type=checkbox] { margin-top: 2px; width: 20px; height: 20px; accent-color: #4f46e5; flex-shrink: 0; }
    .consent-text { font-size: 14px; color: #374151; line-height: 1.5; }
    .btn-submit { width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; transition: all .2s; margin-top: 16px; }
    .btn-submit.enabled { background: #22c55e; color: #fff; }
    .btn-submit.enabled:hover { background: #16a34a; }
    .btn-submit.disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }
    .hint { text-align: center; font-size: 12px; color: #9ca3af; margin-top: 8px; }
    .error-msg { color: #ef4444; font-size: 12px; margin-top: 4px; }
    /* Screens */
    .screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .screen-card { max-width: 420px; width: 100%; background: #fff; border-radius: 20px; border: 1px solid #f3f4f6; box-shadow: 0 2px 8px rgba(0,0,0,.06); padding: 40px 32px; text-align: center; }
    .screen-icon { font-size: 64px; margin-bottom: 16px; }
    .screen-title { font-size: 22px; font-weight: 700; color: #1f2937; margin-bottom: 8px; }
    .screen-body { font-size: 15px; color: #6b7280; line-height: 1.6; }
    .screen-foot { font-size: 12px; color: #9ca3af; border-top: 1px solid #f3f4f6; padding-top: 16px; margin-top: 20px; }
    #app { display: contents; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/intake.js"></script>
</body>
</html>
